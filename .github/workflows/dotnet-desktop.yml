name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore KnitStichGrid.csproj

    - name: Build
      run: dotnet build KnitStichGrid.csproj -c ${{ matrix.configuration }} --no-restore

    - name: Test (if test project exists)
      run: |
        if (Test-Path "KnitStichGrid.Tests\KnitStichGrid.Tests.csproj") {
          dotnet test KnitStichGrid.Tests\KnitStichGrid.Tests.csproj -c ${{ matrix.configuration }} --no-build
        } else {
          Write-Host "No test project found; skipping tests."
        }
